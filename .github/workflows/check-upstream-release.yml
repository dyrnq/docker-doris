name: check-upstream-release
run-name: "Check Upstream Doris Releases"

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Check upstream Apache Doris releases
        id: check
        run: |
          set -euo pipefail

          # ── 1. Collect known versions from CI matrix files ──
          known_versions=$(mktemp)
          for f in .github/workflows/ci.yml .github/workflows/ci-matrix.yml .github/workflows/ci-ver.yml; do
            if [ -f "$f" ]; then
              grep -oP '["\x27]\K\d+\.\d+\.\d+(\.\d+)?(?=["\x27])' "$f" >> "$known_versions" || true
            fi
          done
          sort -u -o "$known_versions" "$known_versions"
          echo "=== Known versions (from CI matrices) ==="
          cat "$known_versions"

          # ── 2. Fetch upstream releases from GitHub API ──
          echo ""
          echo "=== Fetching upstream releases ==="
          releases_json=$(mktemp)
          page=1
          while :; do
            resp=$(curl -sf "https://api.github.com/repos/apache/doris/releases?per_page=100&page=${page}")
            echo "$resp" >> "$releases_json"
            count=$(echo "$resp" | jq 'length')
            if [ "$count" -lt 100 ]; then
              break
            fi
            page=$((page + 1))
          done

          # Build a single JSON array of all releases
          jq -s 'add' "$releases_json" > "${releases_json}.all"
          mv "${releases_json}.all" "$releases_json"

          # ── 3. Filter to stable releases only ──
          stable_versions=$(mktemp)
          jq -r '.[].tag_name' "$releases_json" \
            | grep -oP '^\d+\.\d+\.\d+(\.\d+)?$' \
            | sort -u > "$stable_versions" || true
          echo "=== Stable upstream releases ==="
          cat "$stable_versions"

          # ── 4. Find new versions (upstream but not in known) ──
          new_versions=$(mktemp)
          comm -23 "$stable_versions" "$known_versions" > "$new_versions" || true

          if [ ! -s "$new_versions" ]; then
            echo ""
            echo "✅ No new upstream releases found."
            echo "new_versions=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo ""
          echo "=== 🆕 New upstream releases ==="
          cat "$new_versions"

          # ── 5. For each new version, check if binary downloads exist ──
          with_binary=$(mktemp)
          without_binary=$(mktemp)
          while IFS= read -r ver; do
            # Extract the release body for this version from the collected JSON
            body=$(jq -r --arg v "$ver" '.[] | select(.tag_name == $v) | .body // ""' "$releases_json")
            if echo "$body" | grep -q 'Binary'; then
              echo "$ver" >> "$with_binary"
            else
              echo "$ver" >> "$without_binary"
            fi
          done < "$new_versions"

          echo ""
          echo "=== With binary downloads ==="
          cat "$with_binary" 2>/dev/null || echo "(none)"
          echo "=== Without binary downloads ==="
          cat "$without_binary" 2>/dev/null || echo "(none)"

          # ── 6. Build issue body ──
          {
            echo "## 🆕 New Apache Doris Releases Detected"
            echo ""
            echo "The following upstream releases are not yet tracked in the CI matrices:"
            echo ""

            if [ -s "$with_binary" ]; then
              echo "### ✅ Ready to build (binary available)"
              echo ""
              echo "| Version |"
              echo "|---------|"
              while IFS= read -r ver; do
                echo "| \`${ver}\` |"
              done < "$with_binary"
              echo ""
            fi

            if [ -s "$without_binary" ]; then
              echo "### ⏳ Waiting for binary"
              echo ""
              echo "| Version |"
              echo "|---------|"
              while IFS= read -r ver; do
                echo "| \`${ver}\` |"
              done < "$without_binary"
              echo ""
            fi

            echo "Please update the CI matrix files (\`.github/workflows/ci*.yml\`) to include these versions."
            echo ""
            echo "_Auto-generated by check-upstream-release workflow._"
          } > issue_body.md

          cat issue_body.md
          echo "new_versions=1" >> "$GITHUB_OUTPUT"
          echo 'ISSUE_BODY<<EOF' >> "$GITHUB_ENV"
          cat issue_body.md >> "$GITHUB_ENV"
          echo 'EOF' >> "$GITHUB_ENV"

      - name: Create issue for new releases
        if: steps.check.outputs.new_versions == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const body = process.env.ISSUE_BODY;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'upstream-release',
              state: 'open',
              per_page: 100
            });

            const existing = issues.find(i => i.title.startsWith('🆕 New Apache Doris Releases'));

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: body
              });
              core.notice(`Updated existing issue #${existing.number}`);
            } else {
              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🆕 New Apache Doris Releases Detected',
                body: body,
                labels: ['upstream-release']
              });
              core.notice(`Created issue #${issue.number}`);
            }
